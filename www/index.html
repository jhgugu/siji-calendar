                judgment: '亨，利贞，可小事', interp: '小有过越，大事不宜。小事可成，但大事需谨慎，适可而止。' },
            { pattern: 0b010101, num: 63, name: '水火既济', upper: '坎', lower: '离',
                judgment: '亨小，利贞，初吉终乱', interp: '事已成功，但盛极必衰。大功告成后需防懈怠，守成不易。' },
            { pattern: 0b101010, num: 64, name: '火水未济', upper: '离', lower: '坎',
                judgment: '亨，小狐汔济，濡其尾', interp: '事尚未成，功亏一篑。虽未完成但前景可期，继续努力。' },
        ];

        // 建立 pattern → hexagram 快速索引
        const hexagramByPattern = {};
        HEXAGRAMS.forEach(h => { hexagramByPattern[h.pattern] = h; });

        // ---- 卜卦状态 ----
        let divinationState = {
            active: false,
            lines: [], // 6 个爻值：6=老阴, 7=少阳, 8=少阴, 9=老阳
            currentClick: 0, // 0-5（从下往上）
        };

        /**
         * 模拟三枚铜钱起卦
         * 每枚铜钱正面=3，反面=2，三枚之和 = 6/7/8/9
         */
        function tossCoins() {
            const coins = [
                Math.random() < 0.5 ? 3 : 2,
                Math.random() < 0.5 ? 3 : 2,
                Math.random() < 0.5 ? 3 : 2,
            ];
            return coins[0] + coins[1] + coins[2];
        }

        /**
         * 获取6爻对应的二进制 pattern（阳=1，阴=0，从下往上）
         */
        function getPattern(lines) {
            let pattern = 0;
            for (let i = 0; i < 6; i++) {
                const val = lines[i];
                const isYang = (val === 7 || val === 9);
                if (isYang) pattern |= (1 << i);
            }
            return pattern;
        }

        /**
         * 渲染6条爻线
         */
        function renderYaoLines() {
            const area = document.getElementById('yaoLinesArea');
            area.innerHTML = '';
            const lines = divinationState.lines;
            const clickCount = divinationState.currentClick;

            // 从下往上显示（上爻在上，初爻在下）
            for (let i = 5; i >= 0; i--) {
                const row = document.createElement('div');
                row.classList.add('yao-line');
                row.style.position = 'relative';

                // 序号标注
                const label = document.createElement('span');
                label.style.cssText = 'position:absolute;left:-22px;font-size:10px;color:#a09080;';
                const posNames = ['初', '二', '三', '四', '五', '上'];
                label.textContent = posNames[i];
                row.appendChild(label);

                if (i < clickCount) {
                    // 已生成的爻
                    const val = lines[i];
                    const isYang = (val === 7 || val === 9);
                    const isChanging = (val === 6 || val === 9);

                    if (isYang) {
                        const yang = document.createElement('div');
                        yang.classList.add('yang-line');
                        row.appendChild(yang);
                    } else {
                        const yin = document.createElement('div');
                        yin.classList.add('yin-line');
                        yin.innerHTML = '<span></span><span></span>';
                        row.appendChild(yin);
                    }

                    // 变爻标记（行内，紧跟在爻线右侧）
                    if (isChanging) {
                        const mark = document.createElement('span');
                        mark.classList.add('change-mark');
                        mark.classList.add(val === 9 ? 'old-yang' : 'old-yin');
                        mark.textContent = val === 9 ? '◉' : '✕';
                        mark.title = val === 9 ? '老阳（变爻）' : '老阴（变爻）';
                        row.appendChild(mark);
                    }

                    // 爻值标注（右侧远处）
                    const valLabel = document.createElement('span');
                    valLabel.classList.add('yao-val-label');
                    const valNames = { 6: '老阴', 7: '少阳', 8: '少阴', 9: '老阳' };
                    valLabel.textContent = valNames[val];
                    row.appendChild(valLabel);

                } else if (i === clickCount) {
                    // 当前待点击的位置
                    row.classList.add('pending');
                } else {
                    // 尚未轮到
                    row.style.opacity = '0.25';
                    row.style.border = '1px dashed #d8ccb8';
                    row.style.borderRadius = '6px';
                }

                area.appendChild(row);
            }
        }

        /**
         * 处理一次点击（生成一爻）
         */
        function handleYaoClick() {
            if (divinationState.currentClick >= 6) return;

            const val = tossCoins();
            divinationState.lines[divinationState.currentClick] = val;
            divinationState.currentClick++;

            renderYaoLines();
            updateClickHint();

            if (divinationState.currentClick >= 6) {
                // 全部完成，显示结果
                setTimeout(() => showHexagramResult(), 400);
            }
        }

        /**
         * 更新点击提示
         */
        function updateClickHint() {
            const remaining = 6 - divinationState.currentClick;
            const hint = document.getElementById('divClickHint');
            const subtitle = document.getElementById('divSubtitle');

            if (remaining > 0) {
                hint.innerHTML = '还需摇卦 <span class="click-count">' + remaining + '</span> 次';
                hint.style.display = '';
                subtitle.textContent = '心中默念所求之事，诚心点击';
            } else {
                hint.style.display = 'none';
                subtitle.textContent = '卦象已成，请阅解读';
            }
        }

        /**
         * 显示卦象结果
         */
        function showHexagramResult() {
            const lines = divinationState.lines;
            const pattern = getPattern(lines);

            const hex = hexagramByPattern[pattern];
            if (!hex) {
                document.getElementById('hexagramResult').innerHTML = '<p style="color:red;">卦象匹配错误</p>';
                document.getElementById('hexagramResult').style.display = '';
                return;
            }

            // 计算变卦（之卦）
            let changedPattern = pattern;
            let hasChanging = false;
            const changingLines = [];
            for (let i = 0; i < 6; i++) {
                const val = lines[i];
                if (val === 6 || val === 9) {
                    hasChanging = true;
                    changingLines.push(i);
                    // 翻转该位
                    changedPattern ^= (1 << i);
                }
            }

            const changedHex = hasChanging ? hexagramByPattern[changedPattern] : null;

            const posNames = ['初', '二', '三', '四', '五', '上'];

            // 构建结果 HTML
            let html = '';

            // 卦名
            html += '<div class="hex-name">第' + hex.num + '卦 ' + hex.name + '</div>';
            html += '<div style="font-size:12px;color:#8a7a6a;">上' + hex.upper + '下' + hex.lower + '</div>';
            html += '<div class="hex-judgment">彖曰：' + hex.judgment + '</div>';

            // 变爻
            if (hasChanging && changingLines.length > 0) {
                const changingNames = changingLines.map(i => posNames[i] + '爻').join('、');
                html += '<div style="font-size:12px;color:#c0392b;margin:4px 0;">变爻：' + changingNames +
                    ' → 之卦 ' + (changedHex ? changedHex.name : '—') + '</div>';
            }

            // 解读
            html += '<div class="hex-detail">';
            html += '<strong>📖 卦辞解读：</strong><br>' + hex.interp;
            if (changedHex && changedHex !== hex) {
                html += '<br><br><strong>🔄 之卦 ' + changedHex.name + '：</strong>' + changedHex.interp;
                html += '<br><span style="font-size:11px;color:#888;">（变爻指示事物发展方向）</span>';
            }
            html += '</div>';

            document.getElementById('hexagramResult').innerHTML = html;
            document.getElementById('hexagramResult').style.display = '';
            document.getElementById('divRetryBtn').style.display = '';
            document.getElementById('divClickHint').style.display = 'none';
        }

        /**
         * 渲染卦桶内的木签
         */
        function renderBucketSticks() {
            const container = document.getElementById('divSticks');
            container.innerHTML = '';
            // 8 根木签在桶内微微抖动
            for (let i = 0; i < 8; i++) {
                const stick = document.createElement('div');
                stick.classList.add('stick');
                stick.style.animationDelay = (i * 0.04) + 's';
                container.appendChild(stick);
            }
        }

        /**
         * 卦桶摇动 → 飞出木签 → 生成爻线
         */
        function shakeBucket(callback) {
            const bucket = document.getElementById('divBucket');
            const area = document.getElementById('divBucketArea');
            const sticksContainer = document.getElementById('divSticks');

            // 防止连点
            if (area.classList.contains('busy')) return;
            area.classList.add('busy');

            // 木签剧烈抖动
            const sticks = sticksContainer.querySelectorAll('.stick');
            sticks.forEach(s => {
                s.style.animation = 'stickJitter 0.12s ease-in-out infinite';
            });

            // 卦桶摇动
            bucket.classList.add('shaking');
            document.getElementById('divSubtitle').textContent = '摇卦中…';

            // 摇卦结束飞出木签
            setTimeout(() => {
                bucket.classList.remove('shaking');
                sticks.forEach(s => { s.style.animation = 'stickJitter 0.3s ease-in-out infinite'; });

                // 飞出一根木签
                const flyStick = document.createElement('div');
                flyStick.classList.add('flying-stick');
                flyStick.style.left = '50%';
                flyStick.style.top = '12px';
                document.getElementById('divBucketArea').appendChild(flyStick);

                // 木签飞出后执行回调
                setTimeout(() => {
                    flyStick.remove();
                    area.classList.remove('busy');
                    if (callback) callback();
                }, 600);
            }, 850);
        }

        /**
         * 打开卜卦面板
         */
        function openDivination() {
            divinationState = {
                active: true,
                lines: new Array(6).fill(0),
                currentClick: 0,
            };
            document.getElementById('divinationOverlay').style.display = 'flex';
            document.getElementById('hexagramResult').style.display = 'none';
            document.getElementById('divRetryBtn').style.display = 'none';
            document.getElementById('divBucketArea').classList.remove('busy');
            document.getElementById('divSubtitle').textContent = '心中默念所求之事，点击卦桶摇卦';
            renderBucketSticks();
            renderYaoLines();
            updateClickHint();
        }

        /**
         * 关闭卜卦面板
         */
        function closeDivination() {
            document.getElementById('divinationOverlay').style.display = 'none';
            divinationState.active = false;
        }

        /**
         * 重新卜卦
         */
        function retryDivination() {
            divinationState.lines = new Array(6).fill(0);
            divinationState.currentClick = 0;
            document.getElementById('hexagramResult').style.display = 'none';
            document.getElementById('divRetryBtn').style.display = 'none';
            document.getElementById('divBucketArea').classList.remove('busy');
            document.getElementById('divSubtitle').textContent = '心中默念所求之事，点击卦桶摇卦';
            renderBucketSticks();
            renderYaoLines();
            updateClickHint();
        }

        // ============================================================
        // 十六、事件绑定
        // ============================================================
        document.getElementById('prevMonthBtn').addEventListener('click', () => changeMonth(-1));
        document.getElementById('nextMonthBtn').addEventListener('click', () => changeMonth(1));
        document.getElementById('todayBtn').addEventListener('click', goToToday);
        document.getElementById('addEventBtn').addEventListener('click', addEvent);
        document.getElementById('eventInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') addEvent();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') { changeMonth(-1); hideHuangliPopup(); }
            else if (e.key === 'ArrowRight') { changeMonth(1); hideHuangliPopup(); }
            else if (e.key === 'Escape') {
                hideHuangliPopup();
                closeDivination();
            }
        });

        // ---- 黄历弹窗关闭事件 ----
        document.getElementById('hlCloseBtn').addEventListener('click', hideHuangliPopup);
        document.getElementById('huangliOverlay').addEventListener('click', function(e) {
            if (e.target === this) hideHuangliPopup();
        });

        // ---- 城市选择事件 ----
        document.getElementById('locationDisplay').addEventListener('click', function() {
            document.getElementById('cityOverlay').style.display = 'flex';
            document.getElementById('citySubtitle').textContent = '输入城市名搜索，或使用GPS自动定位';
            document.getElementById('citySearchInput').value = '';
            document.getElementById('citySearchResults').innerHTML = '';
        });
        document.getElementById('citySearchBtn').addEventListener('click', function() {
            searchCity(document.getElementById('citySearchInput').value);
        });
        document.getElementById('citySearchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') searchCity(this.value);
        });
        document.getElementById('cityGpsBtn').addEventListener('click', requestGPSLocation);
        document.getElementById('cityCloseBtn').addEventListener('click', function() {
            document.getElementById('cityOverlay').style.display = 'none';
        });
        document.getElementById('cityOverlay').addEventListener('click', function(e) {
            if (e.target === this) document.getElementById('cityOverlay').style.display = 'none';
        });

        // ---- PWA 安装按钮 ----
        document.getElementById('pwaInstallBtn').addEventListener('click', function() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(result => {
                    console.log('安装结果:', result.outcome);
                    deferredPrompt = null;
                    document.getElementById('pwaInstallBtn').style.display = 'none';
                });
            } else {
                alert('请通过浏览器菜单 → "添加到主屏幕" 安装');
            }
        });

        // ---- 六爻卜卦事件 ----
        // 打开运势面板
        document.getElementById('fortuneBtn').addEventListener('click', openDivination);
        // 点击卦桶 → 摇卦生成一爻
        document.getElementById('divBucket').addEventListener('click', function(e) {
            e.stopPropagation();
            if (divinationState.currentClick < 6 && !document.getElementById('divBucketArea').classList.contains('busy')) {
                shakeBucket(() => handleYaoClick());
            }
        });
        // 关闭按钮
        document.getElementById('divCloseBtn').addEventListener('click', closeDivination);
        // 重新卜卦
        document.getElementById('divRetryBtn').addEventListener('click', retryDivination);
        // 点击遮罩关闭
        document.getElementById('divinationOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeDivination();
        });

        // ============================================================
        // 十七、启动
        // ============================================================
        // ---- PWA: 注册 Service Worker ----
        if ('serviceWorker' in navigator && location.protocol === 'https:') {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                console.log('📦 SW 已注册:', reg.scope);
            }).catch(err => {
                console.log('SW 注册失败（可能非HTTPS）:', err);
            });
        }

        // ---- PWA: 监听安装事件 ----
        let deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // 显示安装按钮
            const installBtn = document.getElementById('pwaInstallBtn');
            if (installBtn) installBtn.style.display = '';
        });

        loadEvents();
        renderCalendar();
        renderEventList();
        initWeather();

        console.log('🌍 四季日历已就绪！');
        console.log('📱 PWA 模式: 部署到 HTTPS 服务器后可安装到手机桌面');
        console.log('📆 每个日期显示对应农历（阴历）');
        console.log('📜 点击日期弹出黄历面板：宜忌、冲煞、吉凶神');
        console.log('🎆 特色节日自动切换主题动画 + 音效（春节🧨、中秋🌕、七夕💫...）');
        console.log('🌸 春季：3-5月 | ☀️ 夏季：6-8月 | 🍂 秋季：9-11月 | ❄️ 冬季：12-2月');
        console.log('📍 气候参考：中国华北平原');
        console.log('🔮 点击「今日运势」按钮，六爻卜卦，点击6次得卦象解读~');
        console.log('💡 用 ← → 方向键切换月份，点击日期查看黄历，按 Esc 关闭弹窗~');
    </script>
</body>
